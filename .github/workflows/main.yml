name: Build Dyrz Client
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and find source
        run: |
          Expand-Archive -Path "dyrz-client-src.zip" -DestinationPath "extracted" -Force
          Write-Host "=== All files found ==="
          Get-ChildItem -Recurse -Filter "CMakeLists.txt" | Select-Object FullName
          Write-Host "=== Top level ==="
          Get-ChildItem extracted

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtnetworkauth qt5compat qtimageformats'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Find and configure CMake
        run: |
          $src = Get-ChildItem -Recurse -Filter "CMakeLists.txt" | 
            Where-Object { $_.Directory.Name -ne "tests" } |
            Select-Object -First 1 |
            Select-Object -ExpandProperty DirectoryName
          Write-Host "Found source at: $src"
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
            -DLauncher_Name=DyrzClient `
            -DLauncher_DisplayName="Dyrz Client" `
            -DLauncher_APP_BINARY_NAME=dyrzclient `
            -S "$src"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: DyrzClient-Windows
          path: build/dyrzclient.exe
          retention-days: 30
